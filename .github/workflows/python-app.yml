# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: rui
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: mta_subway_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rui"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://rui:password123@localhost:5432/mta_subway_db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create database tables
        run: |
          python -c "import models; from database import engine; models.Base.metadata.create_all(bind=engine)"

      - name: Import GTFS data
        run: |
          python import-metro.py

      - name: Run tests
        run: |
          pytest
